<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nepal Election 2026 — Live Results</title>

<style>
body{
font-family:Arial,Helvetica,sans-serif;
background:#0b1a2b;
color:white;
margin:0;
padding:0
}

header{
background:#091421;
padding:15px;
text-align:center;
border-bottom:3px solid #e74c3c
}

h1{
margin:0;
font-size:28px
}

.container{
max-width:1200px;
margin:auto;
padding:20px
}

.section{
margin-top:30px
}

.table{
width:100%;
border-collapse:collapse
}

.table th{
background:#13263f;
padding:10px;
text-align:left
}

.table td{
padding:10px;
border-bottom:1px solid #1e3b5f
}

.status{
padding:4px 8px;
border-radius:4px;
font-size:12px
}

.counting{
background:#f39c12;
color:black
}

.won{
background:#27ae60
}

.party{
font-weight:bold
}

footer{
margin-top:40px;
text-align:center;
color:#9fb3c8;
font-size:13px
}
</style>
</head>

<body>

<header>
<h1>🗳️ Nepal Election 2026 — Live Results</h1>
<div id="clock"></div>
</header>

<div class="container">

<div class="section">
<h2>Latest Summary</h2>
<div id="summary">Loading...</div>
</div>

<div class="section">
<h2>Party Standings</h2>
<table class="table">
<thead>
<tr>
<th>Party</th>
<th>Won</th>
<th>Leading</th>
<th>Total</th>
</tr>
</thead>
<tbody id="party-table">
<tr><td colspan="4">Loading...</td></tr>
</tbody>
</table>
</div>

<div class="section">
<h2>All Constituencies</h2>
<table class="table">
<thead>
<tr>
<th>#</th>
<th>Constituency</th>
<th>Candidate</th>
<th>Party</th>
<th>Votes</th>
<th>Status</th>
</tr>
</thead>

<tbody id="constituency-table">
<tr>
<td colspan="6">Loading constituencies...</td>
</tr>
</tbody>

</table>
</div>

</div>

<footer>
Nepal Election Dashboard · Auto updated from GitHub Actions
</footer>

<script>

function updateClock(){
const now=new Date().toLocaleString("en-US",{timeZone:"Asia/Kathmandu"});
document.getElementById("clock").innerText="Nepal Time: "+now;
}

setInterval(updateClock,1000);
updateClock();

async function loadData(){

try{

const response=await fetch("data.json?v="+Date.now());
const data=await response.json();

document.getElementById("summary").innerText=data.summary || "—";

renderParties(data.parties);
renderConstituencies(data.constituencies);

}
catch(err){
console.log(err);
}

}

function renderParties(parties){

if(!parties)return;

const tbody=document.getElementById("party-table");

const order=["rsp","nc","uml","ncp"];

tbody.innerHTML=order.map(key=>{

if(!parties[key])return"";

const p=parties[key];

return `
<tr>
<td class="party">${key.toUpperCase()}</td>
<td>${p.won||0}</td>
<td>${p.leading||0}</td>
<td>${p.total||0}</td>
</tr>
`;

}).join("");

}

function renderConstituencies(seats){

if(!seats)return;

const tbody=document.getElementById("constituency-table");

tbody.innerHTML=seats.map((seat,i)=>{

const statusClass=seat.status==="won"?"won":"counting";

return `
<tr>
<td>${i+1}</td>
<td>${seat.const}</td>
<td>${seat.candidate}</td>
<td>${seat.party}</td>
<td>${seat.votes?.toLocaleString() || "-"}</td>
<td><span class="status ${statusClass}">
${seat.status==="won"?"RESULT":"COUNTING"}
</span></td>
</tr>
`;

}).join("");

}

loadData();

setInterval(loadData,30000);

</script>

</body>
</html>
